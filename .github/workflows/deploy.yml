name: CI/CD Deploy

on:
  push:
    branches: [release_liennganh]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'liennganh/src/**'
              - 'liennganh/pom.xml'
              - 'liennganh/Dockerfile'
            frontend:
              - 'liennganh/shopee-frontend/**'

  build-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./liennganh
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/shopee-backend:${{ steps.vars.outputs.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/shopee-backend:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/shopee-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/shopee-backend:buildcache,mode=max

  build-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./liennganh/shopee-frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/shopee-frontend:${{ steps.vars.outputs.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/shopee-frontend:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/shopee-frontend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/shopee-frontend:buildcache,mode=max

  deploy:
    needs: [detect-changes, build-backend, build-frontend]
    if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ needs.build-backend.outputs.image_tag || needs.build-frontend.outputs.image_tag }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DEPLOY_BACKEND: ${{ needs.detect-changes.outputs.backend }}
      DEPLOY_FRONTEND: ${{ needs.detect-changes.outputs.frontend }}
    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          envs: IMAGE_TAG,DOCKERHUB_USERNAME,DEPLOY_BACKEND,DEPLOY_FRONTEND
          script: |
            cd ~/lien/liennganh
            export IMAGE_TAG=$IMAGE_TAG
            export DOCKERHUB_USERNAME=$DOCKERHUB_USERNAME

            SERVICES=""
            if [ "$DEPLOY_BACKEND" = "true" ]; then SERVICES="$SERVICES backend"; fi
            if [ "$DEPLOY_FRONTEND" = "true" ]; then SERVICES="$SERVICES frontend"; fi

            docker compose -f docker-compose.prod.yml pull $SERVICES
            docker compose -f docker-compose.prod.yml up -d --no-deps $SERVICES
            docker image prune -f
